name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Chromium for HTML PDF renderer
        run: python -m playwright install --with-deps chromium

      - name: Run tests
        run: python -m pytest -q

      - name: Run ruff
        run: python -m ruff check astro services scripts

      - name: Validate astro skill
        run: python .github/workflows/validate_skill.py astro
