name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Check artifacts
        run: twine check dist/*.whl dist/*.tar.gz

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.whl *.tar.gz > checksums.txt
          cat checksums.txt

      # Keep packages and checksums as separate artifacts so PyPI publish
      # never sees checksums.txt (twine rejects non-distributions).
      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: dist/checksums.txt

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Download checksums
        uses: actions/download-artifact@v4
        with:
          name: checksums
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
          generate_release_notes: true

  publish-pypi:
    name: Publish to PyPI
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/astro-skill
    permissions:
      id-token: write  # required for trusted publishing (OIDC)
    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
